<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad" gradientTransform="rotate(199)">
            <stop offset="0%" stop-color="#1F2937" />
            <stop offset="100%" stop-color="#111827" />
        </linearGradient>
        
        <!-- Vignette: Inline'da daha hafif, Cover'da daha sert -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
            <stop offset="30%" stop-color="#000000" stop-opacity="0" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.35" />
        </radialGradient>
        
        <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
        </linearGradient>

        <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#DC2626" stroke-width="0.5" stroke-opacity="0.1" />
            <circle cx="40" cy="40" r="1.5" fill="#DC2626" opacity="0.3" />
        </pattern>
        
        <pattern id="dotPattern" width="15" height="15" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#DC2626" opacity="0.18" />
        </pattern>
        
        <filter id="softGlow">
            <feGaussianBlur stdDeviation="60" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Arka Plan -->
    <rect width="100%" height="100%" fill="url(#bgGrad)" />
    
    <!-- Pattern Overlay: Inline Dot yoğun, Cover Grid düşük -->
    <rect width="100%" height="100%" fill="url(#dotPattern)" />
    
    <!-- Cam Paneller -->
    <polygon points="1437,-100 1137,-100 637,675 937,675" fill="url(#glassGrad)" opacity="0.08" />
           <polygon points="263,-100 -237,-100 -637,675 -137,675" fill="url(#glassGrad)" opacity="0.06" />
    
    <!-- Soft Inner Glow -->
    <circle cx="600" cy="337" r="300" fill="#1F2937" opacity="0.2" filter="url(#softGlow)"/>

    <!-- Mekanik Vinç Silüeti -->
    
        <g transform="translate(89, 529) scale(1.4, 1.4)" opacity="0.04">
            <rect x="0" y="150" width="160" height="35" rx="6" fill="#DC2626"/>
            <circle cx="35" cy="185" r="16" fill="#080C13"/>
            <circle cx="125" cy="185" r="16" fill="#080C13"/>
            <polygon points="50,150 90,150 320,-80 290,-100" fill="#DC2626"/>
            <rect x="290" y="-120" width="50" height="35" rx="5" fill="#111827"/>
            <path d="M 70 150 L 220 10" stroke="#080C13" stroke-width="8" opacity="0.8"/>
            <path d="M 80 150 L 240 -10" stroke="#080C13" stroke-width="4" opacity="0.5"/>
            <polygon points="50,150 65,150 300,-85 290,-95" fill="#ffffff" opacity="0.1"/>
        </g>
    
    
    <!-- Kırmızı Accent Markörler -->
    <rect x="871" y="600" width="200" height="10" fill="#DC2626" opacity="0.8" />
           <rect x="1091" y="600" width="30" height="10" fill="#DC2626" opacity="0.4" />

    <!-- Vignette Çerçevesi -->
    <rect width="100%" height="100%" fill="url(#vignette)" pointer-events="none" />
</svg>